# ─────────────────────────────────────────
# YouTube Shorts 자동 생성 설정
# ─────────────────────────────────────────

# ── 스케줄 설정 ──────────────────────────
schedule:
  interval_hours: 3      # 몇 시간 간격으로 1개 생성 (3 = 3시간마다 1개)
  daily_limit: 8         # 하루 최대 생성 개수
  start_time: "09:00"    # 첫 실행 시각 (HH:MM)

# ── 영상 설정 ────────────────────────────
video:
  resolution: [1080, 1920]   # 너비 x 높이 (9:16 숏츠 비율)
  fps: 30
  target_duration: 50        # 목표 영상 길이 (초)

# ── 자막 설정 ────────────────────────────
subtitle:
  font_path: "C:/Windows/Fonts/malgunbd.ttf"  # 맑은 고딕 Bold
  font_size: 55
  color: [255, 255, 255]       # 흰색
  stroke_color: [0, 0, 0]      # 검정 테두리
  stroke_width: 3
  box_opacity: 160             # 자막 배경 박스 투명도 (0~255)
  padding_bottom: 120          # 화면 하단 여백 (px)

# ── BGM 설정 ─────────────────────────────
bgm:
  enabled: true
  volume: 0.12        # 배경음악 볼륨 (0.0~1.0)
  path: "temp/bgm.wav"

# ── TTS 설정 ─────────────────────────────
tts:
  voice: "ko-KR-SunHiNeural"   # 밝고 발랄한 여성 목소리
  # 다른 선택지: ko-KR-YuJinNeural (더 젊은 느낌)
  speed: "+25%"                 # 속도 (+%: 빠름, -%: 느림)

# ── 다국어 설정 ──────────────────────────
# 영상 1개 생성 시 아래 언어들로 각각 영상을 만들어 업로드한다
# youtube_regions: YouTube 지역 제한 (해당 국가에서만 노출)
languages:
  - code: ko
    name: 한국어
    tts_voice: "ko-KR-SunHiNeural"
    font_path: "C:/Windows/Fonts/malgunbd.ttf"
    watermark: ""
    youtube_regions: ["KR"]
    platforms: [youtube, instagram, facebook, threads]  # tiktok: 심사 대기 중
  # - code: en
  #   name: English
  #   tts_voice: "en-US-JennyNeural"
  #   font_path: "C:/Windows/Fonts/malgunbd.ttf"
  #   watermark: ""
  #   youtube_regions: ["US", "GB", "CA", "AU", "NZ", "IE"]
  #   platforms: [youtube]
  # - code: ja
  #   name: 日本語
  #   tts_voice: "ja-JP-NanamiNeural"
  #   font_path: "C:/Windows/Fonts/msgothic.ttc"
  #   watermark: ""
  #   youtube_regions: ["JP"]
  #   platforms: [youtube]
  # - code: zh
  #   name: 中文
  #   tts_voice: "zh-CN-XiaoxiaoNeural"
  #   font_path: "C:/Windows/Fonts/msyh.ttc"
  #   watermark: ""
  #   youtube_regions: ["CN", "TW", "HK", "MO", "SG"]
  #   platforms: [youtube]

# ── SNS 업로드 설정 ───────────────────────
# 토큰/ID는 .env 파일에서 관리 (config에 하드코딩 금지)
sns:
  instagram:
    enabled: false   # 권한 토큰 재발급 후 true로 변경
  facebook:
    enabled: false   # 권한 토큰 재발급 후 true로 변경
  threads:
    enabled: false   # 권한 토큰 재발급 후 true로 변경
  tiktok:
    enabled: false   # 심사 대기 중 — 완료 후 true로 변경

# ── 저장 경로 ────────────────────────────
output_dir: "output"
temp_dir: "temp"
