name: YouTube Shorts Auto Upload

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'   # 6시간 간격 (UTC 00/06/12/18시 = KST 09/15/21/03시)
  workflow_dispatch:
    inputs:
      topic_id:
        description: 'Supabase Topic ID (비우면 자동 선택)'
        required: false
        default: ''

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ── 1. 코드 체크아웃 ────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 설정 ──────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 시스템 패키지 (ffmpeg + 한글 폰트) ───────────────
      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-nanum

      # ── 4. Python 패키지 ────────────────────────────────────
      - name: Install Python packages
        run: pip install -r requirements.txt

      # ── 5. 영상 생성 + YouTube 업로드 (Supabase 주제 기반) ──
      - name: Generate and upload
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          TOPIC_ID="${{ github.event.inputs.topic_id }}"
          if [ -n "$TOPIC_ID" ]; then
            python -X utf8 main.py web "$TOPIC_ID"
          else
            python -X utf8 main.py web
          fi

      # ── 6. 생성된 영상 아티팩트 저장 (7일 보관) ─────────────
      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7
          if-no-files-found: ignore
